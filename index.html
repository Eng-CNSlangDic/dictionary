var terms = TERMS.map(function(t){ return Object.assign({},t); });
var added = JSON.parse(localStorage.getItem("slang_added_terms") || "[]");
var activeFilter = "all";
var expandedId = null;
var editingId = null;

var catLabel = {abbrev:"缩写",genz:"Gen Z",internet:"网络",social:"社交",emoji:"表情",misc:"其他"};
var catCls   = {abbrev:"t-abbrev",genz:"t-genz",internet:"t-internet",social:"t-social",emoji:"t-emoji",misc:"t-misc"};

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function allTerms(){ return added.concat(terms); }

function filtered(){
  var q = document.getElementById("searchInput").value.toLowerCase();
  return allTerms().filter(function(t){
    var okCat = activeFilter==="all" || t.cat===activeFilter;
    var okQ = !q || t.term.toLowerCase().indexOf(q)>-1 ||
      (t.zh&&t.zh.indexOf(q)>-1) ||
      (t.lit&&t.lit.indexOf(q)>-1) ||
      (t.en&&t.en.toLowerCase().indexOf(q)>-1) ||
      (t.pron&&t.pron.toLowerCase().indexOf(q)>-1);
    return okCat && okQ;
  });
}

function render(){
  var list = document.getElementById("list");
  var f = filtered();
  document.getElementById("countEl").textContent = f.length + " 个词条";
  if(!f.length){
    list.innerHTML = '<div class="empty"><i class="ti ti-search" style="font-size:2rem;color:var(--color-text-tertiary)" aria-hidden="true"></i><br><br>没有找到相关词条<br><span style="font-size:13px">No terms found</span></div>';
    return;
  }
  list.innerHTML = f.map(function(t){
    var exp = expandedId===t.id;
    var preview = (t.lit||t.zh||"");
    if(preview.length>32) preview=preview.slice(0,32)+"…";
    return '<div class="card'+(exp?" open":"")+'" onclick="toggle('+t.id+')">'+
      '<div class="card-top">'+
        '<span class="tag '+(catCls[t.cat]||"t-misc")+'">'+(catLabel[t.cat]||t.cat)+'</span>'+
        '<div style="flex:1;min-width:0">'+
          '<div class="card-term">'+esc(t.term)+'</div>'+
          (t.pron?'<div class="card-pron">'+esc(t.pron)+'</div>':'')+
          (!exp?'<div class="card-preview">'+esc(preview)+'</div>':'')+
        '</div>'+
        '<i class="ti '+(exp?"ti-chevron-up":"ti-chevron-down")+' chevron" aria-hidden="true"></i>'+
      '</div>'+
      (exp?
        '<div class="body">'+
          (added.some(function(a){return a.id===t.id;}) ?
          '<div style="margin-bottom:10px"><button onclick="event.stopPropagation();editTerm('+t.id+')">✏️ Edit</button> <button onclick="event.stopPropagation();deleteTerm('+t.id+')">🗑 Delete</button></div>' : '')+
          (t.lit?'<div class="dlabel">直译 Literal</div><div class="dval">'+esc(t.lit)+'</div>':'')+
          (t.zh?'<div class="dlabel">实意 / 用意</div><div class="dval">'+esc(t.zh)+'</div>':'')+
          (t.en?'<div class="dlabel">英文全称</div><div class="dval">'+esc(t.en)+'</div>':'')+
        '</div>'
      :'')+
    '</div>';
  }).join("");
}
